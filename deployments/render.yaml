services:
  - type: web
    name: novexa-gateway
    runtime: docker
    dockerfilePath: ./deployments/Dockerfile
    envVars:
      - key: NOVEXA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: novexa-data
      mountPath: /app/data
      sizeGB: 1
