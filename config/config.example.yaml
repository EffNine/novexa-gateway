# Conductor Configuration Example
# Copy this file to config.yaml and fill in your API keys.
# All values can be overridden with environment variables.

# Server configuration
server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 120s
  max_request_size: 10MB
  cors:
    enabled: true
    origins: ["*"]
    methods: ["GET", "POST", "OPTIONS"]
    headers: ["Authorization", "Content-Type"]

# Gateway API key (required - set via CONDUCTOR_API_KEY env var)
api_key: "${CONDUCTOR_API_KEY}"

# Provider configuration
providers:
  openai:
    enabled: true
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    timeout: 60s
    max_retries: 3

  anthropic:
    enabled: false
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    timeout: 60s
    max_retries: 3

  gemini:
    enabled: false
    api_key: "${GEMINI_API_KEY}"
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    timeout: 60s
    max_retries: 3

  deepseek:
    enabled: false
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com/v1"
    timeout: 60s
    max_retries: 3

  openrouter:
    enabled: false
    api_key: "${OPENROUTER_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    timeout: 60s
    max_retries: 3

  groq:
    enabled: false
    api_key: "${GROQ_API_KEY}"
    base_url: "https://api.groq.com/openai/v1"
    timeout: 30s
    max_retries: 3

  ollama:
    enabled: false
    # Local OpenAI-compatible API (default). For Ollama Cloud, set OLLAMA_API_KEY
    # (auto-enables and points at https://ollama.com/v1) or set base_url explicitly.
    api_key: "${OLLAMA_API_KEY}"
    base_url: "http://localhost:11434/v1"
    timeout: 120s
    max_retries: 1
    # Static Model List used when the provider cannot list models dynamically
    models:
      - "llama3"
      - "mistral"

  lmstudio:
    enabled: false
    base_url: "http://localhost:1234/v1"
    timeout: 120s
    max_retries: 1
    models:
      - "local-model"

  # OpenCode Zen — OpenAI-compatible for models served via /chat/completions
  # (Grok, DeepSeek, MiniMax, GLM, Kimi, etc.). GPT models use /responses and
  # Claude models use /messages; those need dedicated adapters later.
  opencode:
    enabled: false
    api_key: "${OPENCODE_API_KEY}"
    base_url: "https://opencode.ai/zen/v1"
    timeout: 60s
    max_retries: 3

  # NVIDIA NIM (hosted or self-hosted OpenAI-compatible)
  # With catalog.curated_only: true, only these Model IDs are advertised —
  # useful because NIM's /models catalog is large and mixes unreachable endpoints.
  nvidia_nim:
    enabled: false
    api_key: "${NVIDIA_NIM_API_KEY}"
    base_url: "https://integrate.api.nvidia.com/v1"
    timeout: 60s
    max_retries: 3
    models:
      - "deepseek-ai/deepseek-v4-flash"
      - "meta/llama-3.1-8b-instruct"
    # Auto mode: when the client sends model: "auto", pick the best NIM model
    # at runtime from the advertised catalog using health, cost, and latency.
    # The gateway classifies each request (coding, reasoning, vision, fast,
    # elite, default) and uses the matching task profile. If task_profiles is
    # omitted, built-in defaults based on the NIM model comparison are used.
    auto:
      enabled: false
      provider: "nvidia_nim"
      lookback: 24h
      weights:
        reachability: 10.0
        cost: 3.0
        latency: 2.0
      task_profiles:
        elite:
          models:
            - "mistralai/mistral-large-3-675b-instruct-2512"
            - "nvidia/nemotron-3-super-120b-a12b"
            - "openai/gpt-oss-120b"
            - "qwen/qwen3-next-80b-a3b-instruct"
            - "nvidia/llama-3.3-nemotron-super-49b-v1.5"
          weights:
            reachability: 10.0
            cost: 1.0
            latency: 2.0
        coding:
          models:
            - "stepfun-ai/step-3.7-flash"
            - "meta/llama-3.1-70b-instruct"
            - "nvidia/llama-3.3-nemotron-super-49b-v1"
            - "stepfun-ai/step-3.5-flash"
            - "openai/gpt-oss-20b"
          weights:
            reachability: 10.0
            cost: 2.0
            latency: 3.0
        vision:
          models:
            - "meta/llama-3.2-11b-vision-instruct"
          weights:
            reachability: 10.0
            cost: 1.0
            latency: 1.0

  # Nous Portal subscription gateway
  nous_portal:
    enabled: false
    api_key: "${NOUS_PORTAL_API_KEY}"
    base_url: "https://inference-api.nousresearch.com/v1"
    timeout: 60s
    max_retries: 3

  # xAI — OpenAI-compatible API for Grok and other xAI models
  xai:
    enabled: false
    api_key: "${XAI_API_KEY}"
    base_url: "https://api.x.ai/v1"
    timeout: 60s
    max_retries: 3

  # Agnes AI — OpenAI-compatible API
  agnesai:
    enabled: false
    api_key: "${AGNES_API_KEY}"
    base_url: "https://apihub.agnes-ai.com/v1"
    timeout: 60s
    max_retries: 3

# Catalog advertisement
# curated_only: optional static allowlists. Default false = dynamic ListModels
# from each provider, then health.models probes hide failures (with backoff recovery).
# When true, providers with a non-empty `models` list advertise only that
# allowlist; providers with an empty list still use dynamic catalogs.
catalog:
  curated_only: false

# Model routing (required unless you only use provider-prefixed IDs from /v1/models)
# model_id: optional override of the upstream model slug sent to the provider
# Prefixed Model IDs from /v1/models (e.g. groq/llama3-8b) strip the provider
# prefix before lookup; the base Model ID must route to that provider.
routes:
  "gpt-4o":
    provider: openai
  "gpt-4o-mini":
    provider: openai
  "claude-sonnet-4-20250514":
    provider: anthropic
  "claude-3-5-haiku-20241022":
    provider: anthropic
  "gemini-2.5-pro":
    provider: gemini
  "gemini-2.5-flash":
    provider: gemini
  "deepseek-chat":
    provider: deepseek
  "deepseek-reasoner":
    provider: deepseek

# Model aliases (optional)
aliases:
  "fast": "gpt-4o-mini"
  "smart": "gpt-4o"
  "coding": "deepseek-chat"
  "cheap": "gpt-4o-mini"
  "local": "llama3.1:8b"

# Fallback chains (optional)
# model_id: optional override of the upstream model slug sent to the provider
fallbacks:
  "deepseek-chat":
    - provider: deepseek
    - provider: openrouter
      model_id: "deepseek/deepseek-chat"
    - provider: groq
      model_id: "deepseek-r1-distill-llama-70b"

# Retry configuration
retry:
  max_retries: 3
  initial_backoff: 100ms
  max_backoff: 5s
  backoff_multiplier: 2.0
  retryable_status_codes: [429, 500, 502, 503]

# Database configuration
database:
  driver: "sqlite"
  dsn: "./data/conductor.db"
  max_open_conns: 10
  max_idle_conns: 5

# Logging configuration
logging:
  level: "info"
  format: "json"
  log_prompts: false
  log_responses: false

# Rate limiting
rate_limit:
  enabled: true
  global:
    requests_per_minute: 1000
  per_provider:
    requests_per_minute: 100

# Health monitoring
health:
  check_interval: 60s
  timeout: 10s
  unhealthy_threshold: 3
  # Probe all providers on startup/redeploy, then every check_interval.
  # Until the first pass finishes, /v1/models shows the full catalog (no flicker).
  # After that, never-probed models stay visible when unknown_as_reachable: true
  # (default). Failed probes enter exponential backoff and retry before the next
  # full pass. Catalog updates are batched (~100ms) for atomic snapshots.
  models:
    enabled: true
    hide_unreachable: true
    check_interval: 2h
    timeout: 60s
    concurrency: 3
    unhealthy_threshold: 1
    providers: []   # empty = all providers
    unknown_as_reachable: true
    startup_probe_in_parallel: true
    catalog_batch_window: 100ms
    retry_interval: 30s
    backoff:
      enabled: true
      initial_delay: 30s
      max_delay: 12h
      multiplier: 3.5
      jitter_fraction: 0.2
    error_tracking:
      enabled: true
      window: 5m
      unhealthy_threshold: 0.15
      recovery_threshold: 0.05

# Usage tracking
usage:
  enabled: true

# Cost tracking
cost:
  enabled: true
  currency: "USD"
  # Manual Cost Rates used when a provider has no GetPricing data
  rates:
    - provider: "ollama"
      provider_model_id: "llama3"
      unit_type: "token"
      unit_size: 1000
      input_price: 0.0
      output_price: 0.0

