# Novexa Gateway — Fly.io (run from repo root: fly deploy)
#
# One-shot setup:
#   ./scripts/fly-deploy.sh
# Or manually:
#   fly apps create <app>
#   fly volumes create novexa_data --size 1 --region iad
#   fly secrets set NOVEXA_API_KEY=... OPENAI_API_KEY=...
#   fly deploy

app = "novexa-gateway"
primary_region = "iad"

[build]
  dockerfile = "deployments/Dockerfile"

[env]
  NOVEXA_SERVER_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[mounts]
  source = "novexa_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
