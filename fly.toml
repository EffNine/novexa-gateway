# fly.toml app configuration file generated for conductor-yknfkg on 2026-07-22T14:24:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'conductor-yknfkg'
primary_region = 'sin'

[build]
  dockerfile = 'deployments/Dockerfile'

[env]
  CONDUCTOR_SERVER_PORT = '8080'
  # Advertise a short NIM allowlist instead of the full ~180-model catalog.
  # Override the list with CONDUCTOR_PROVIDERS_NVIDIA_NIM_MODELS (comma-separated)
  # or providers.nvidia_nim.models in config.yaml.
  CONDUCTOR_CATALOG_CURATED_ONLY = 'true'
  # Probe only NIM so the available-only pass finishes quickly on small VMs.
  CONDUCTOR_HEALTH_MODELS_PROVIDERS = 'nvidia_nim'

[[mounts]]
  source = 'conductor_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
