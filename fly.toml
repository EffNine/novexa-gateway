# fly.toml app configuration file generated for novexa-gateway on 2026-07-20T11:28:26Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'novexa-gateway'
primary_region = 'sin'

[build]
  dockerfile = 'deployments/Dockerfile'

[env]
  NOVEXA_SERVER_PORT = '8080'

[[mounts]]
  source = 'novexa_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
